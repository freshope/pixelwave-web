name: build-and-push

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Compute image tags
        id: meta
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          # ref = 브랜치 push 면 브랜치명(main/develop), 태그 push 면 태그명(v1.2.3)
          echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          # v* 태그 push 일 때만 :latest 도 갱신 (항상 최신 릴리즈를 가리키는 mutable 핸들)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          # registry:2 가 buildx 의 OCI attestation/index manifest 를 거부해 "unknown: unknown error" 가 난다.
          # provenance/sbom 끄고 + oci-mediatypes=false 로 docker schema2 단일 image manifest 만 push.
          provenance: false
          sbom: false
          outputs: type=registry,oci-mediatypes=false
          # build-push-action 은 빈 줄을 무시하므로 latest 가 아닐 때 3번째 줄은 자동 생략됨
          tags: |
            ${{ secrets.REGISTRY_URL }}/pixelwave-web:${{ steps.meta.outputs.sha }}
            ${{ secrets.REGISTRY_URL }}/pixelwave-web:${{ steps.meta.outputs.ref }}
            ${{ steps.meta.outputs.latest == 'true' && format('{0}/pixelwave-web:latest', secrets.REGISTRY_URL) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
