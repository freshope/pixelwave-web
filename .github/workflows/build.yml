name: build-and-push

on:
  push:
    branches: [develop]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Compute image tags
        id: meta
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          # ref = 브랜치 push 면 브랜치명(main/develop), 태그 push 면 태그명(v1.2.3)
          echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          # v* 태그 push 일 때만 :latest 도 갱신 (항상 최신 릴리즈를 가리키는 mutable 핸들)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          # registry:2 가 buildx 의 OCI attestation/index manifest 를 거부해 "unknown: unknown error" 가 난다.
          # provenance/sbom 끄고 + oci-mediatypes=false 로 docker schema2 단일 image manifest 만 push.
          provenance: false
          sbom: false
          outputs: type=registry,oci-mediatypes=false
          # build-push-action 은 빈 줄을 무시하므로 latest 가 아닐 때 latest/main 줄은 자동 생략됨
          tags: |
            ${{ secrets.REGISTRY_URL }}/pixelwave-web:${{ steps.meta.outputs.sha }}
            ${{ secrets.REGISTRY_URL }}/pixelwave-web:${{ steps.meta.outputs.ref }}
            ${{ steps.meta.outputs.latest == 'true' && format('{0}/pixelwave-web:latest', secrets.REGISTRY_URL) || '' }}
            ${{ steps.meta.outputs.latest == 'true' && format('{0}/pixelwave-web:main', secrets.REGISTRY_URL) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify deploy
        # v* 태그 push 로 이미지가 registry 에 올라간 직후 Coolify 배포를 트리거한다.
        # GHA 가 push 완료를 아는 주체이므로, 빌드 전에 뜨는 git webhook 대신 여기서 호출한다.
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          curl --fail-with-body -sS \
            "$COOLIFY_URL/api/v1/deploy?uuid=$COOLIFY_APP_UUID&force=false" \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN"
